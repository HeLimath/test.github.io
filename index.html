<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사용자 조절 폰트 페이지</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 20px;
            transition: font-size 0.2s ease; /* 부드러운 전환 */
        }
        .controls {
            margin-bottom: 20px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 8px;
        }
        button {
            padding: 10px 15px;
            margin-right: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="controls">
        <button onclick="changeFontSize(1)">글씨 크게</button>
        <button onclick="changeFontSize(-1)">글씨 작게</button>
    </div>

    <div id="content">
        <h1>참여자 명단</h1>
        <p>아이폰 크롬에서는 시스템 설정을 자동으로 가져오지 못합니다. 대신 위 버튼으로 글씨를 조절하세요!</p>
    </div>

    <script>
        let currentSize = 16;
        function changeFontSize(delta) {
            currentSize += delta * 2;
            document.getElementById('content').style.fontSize = currentSize + 'px';
        }
    </script>
</body>
</html>
