<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!-- 모바일 반응형 설정을 위한 필수 태그 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반응형 폰트 테스트</title>
    <style>
        /* 모바일 브라우저의 자동 글꼴 크기 조절 방지 */
        html {
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        body {
            font-family: sans-serif;
            padding: 20px;
        }

        /* 폰트 크기를 확실하게 강제하는 클래스 */
        .force-font-size {
            font-size: 24px !important;
            line-height: 1.5;
            color: #333;
        }

        @media (max-width: 600px) {
            .force-font-size {
                font-size: 20px !important; /* 모바일용 크기 */
            }
        }
    </style>
</head>
<body>
    <div class="force-font-size">
        이 텍스트는 모바일에서도 글꼴 크기가 적용됩니다.
    </div>
</body>
</html>
