<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연찬회 관리자 페이지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f1f5f9; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #E25540; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased p-5">
    
    <!-- 로그인 화면 -->
    <div id="login-screen" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-2xl shadow-md text-center">
        <h1 class="text-2xl font-black text-gray-800 mb-6"><i class="fa-solid fa-lock text-red-500 mr-2"></i>관리자 인증</h1>
        <input type="password" id="admin-pw" placeholder="관리자 비밀번호 입력 (admin123)" class="w-full border border-gray-300 rounded-xl p-3 mb-4 focus:ring-2 focus:ring-red-400 outline-none text-center">
        <button onclick="checkPassword()" class="w-full bg-red-500 text-white font-bold py-3 rounded-xl hover:bg-red-600 transition">접속하기</button>
    </div>

    <!-- 대시보드 화면 (초기 숨김) -->
    <div id="dashboard-screen" class="max-w-2xl mx-auto hidden pb-20">
        <div class="flex justify-between items-center mb-8 mt-5">
            <h1 class="text-2xl font-black text-gray-800"><i class="fa-solid fa-gear text-red-500 mr-2"></i>연찬회 데시보드</h1>
            <span id="status-badge" class="bg-gray-200 text-gray-600 px-3 py-1 rounded-full text-xs font-bold flex items-center"><i class="fa-solid fa-circle-xmark mr-1"></i>연결 중...</span>
        </div>

        <!-- 1. 공지사항 팝업 설정 -->
        <div class="bg-white p-6 rounded-2xl shadow-sm mb-6 border border-gray-100">
            <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center"><i class="fa-solid fa-bell text-amber-500 mr-2"></i>실시간 공지사항 팝업</h2>
            
            <div class="flex items-center mb-4">
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="popup-toggle" class="sr-only peer">
                    <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-amber-500"></div>
                    <span class="ml-3 text-sm font-medium text-gray-700">팝업 켜기 / 끄기 (앱을 켠 선생님들께 즉시 팝업이 뜹니다)</span>
                </label>
            </div>
            
            <textarea id="popup-message" rows="3" placeholder="화면 중앙에 나타날 공지사항 내용을 입력하세요. (예: 비가 오니 우산을 챙겨서 로비로 모여주세요!)" class="w-full border border-gray-300 rounded-xl p-3 text-sm focus:ring-2 focus:ring-amber-400 outline-none resize-none"></textarea>
        </div>

        <!-- 2. 그룹 설정 -->
        <div class="bg-white p-6 rounded-2xl shadow-sm mb-6 border border-gray-100">
            <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center"><i class="fa-solid fa-users text-blue-500 mr-2"></i>조(그룹) 인원 배정</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- A Group -->
                <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
                    <h3 class="font-bold text-gray-700 mb-2">창동 과학관 투어</h3>
                    <input type="text" id="group-a-leader" placeholder="팀장 이름" class="w-full border border-gray-300 rounded-lg p-2 text-sm mb-2 outline-none">
                    <textarea id="group-a-members" rows="2" placeholder="팀원 이름 (쉼표로 구분)" class="w-full border border-gray-300 rounded-lg p-2 text-sm outline-none resize-none"></textarea>
                </div>
                <!-- B Group -->
                <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
                    <h3 class="font-bold text-gray-700 mb-2">DDP 투어</h3>
                    <input type="text" id="group-b-leader" placeholder="팀장 이름" class="w-full border border-gray-300 rounded-lg p-2 text-sm mb-2 outline-none">
                    <textarea id="group-b-members" rows="2" placeholder="팀원 이름 (쉼표로 구분)" class="w-full border border-gray-300 rounded-lg p-2 text-sm outline-none resize-none"></textarea>
                </div>
                <!-- C Group -->
                <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
                    <h3 class="font-bold text-gray-700 mb-2">C 그룹</h3>
                    <input type="text" id="group-c-leader" placeholder="팀장 이름" class="w-full border border-gray-300 rounded-lg p-2 text-sm mb-2 outline-none">
                    <textarea id="group-c-members" rows="2" placeholder="팀원 이름 (쉼표로 구분)" class="w-full border border-gray-300 rounded-lg p-2 text-sm outline-none resize-none"></textarea>
                </div>
                <!-- D Group -->
                <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
                    <h3 class="font-bold text-gray-700 mb-2">D 그룹</h3>
                    <input type="text" id="group-d-leader" placeholder="팀장 이름" class="w-full border border-gray-300 rounded-lg p-2 text-sm mb-2 outline-none">
                    <textarea id="group-d-members" rows="2" placeholder="팀원 이름 (쉼표로 구분)" class="w-full border border-gray-300 rounded-lg p-2 text-sm outline-none resize-none"></textarea>
                </div>
            </div>
        </div>

        <!-- 저장 버튼 -->
        <button id="save-btn" class="w-full bg-slate-800 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-slate-900 transition flex justify-center items-center opacity-50 pointer-events-none">
            <div id="save-spinner" class="loader mr-2"></div>
            <span id="save-text">Firebase 연결 대기 중...</span>
        </button>
    </div>

    <script>
        function checkPassword() {
            const pw = document.getElementById('admin-pw').value;
            if(pw === "admin123") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard-screen').classList.remove('hidden');
            } else {
                alert("비밀번호가 틀렸습니다.");
            }
        }
    </script>

    <!-- Firebase 스크립트 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ⚠️주의: 깃허브 배포 시 아래 빈칸에 선생님의 실제 파이어베이스 설정값을 붙여넣어야 합니다!
        const firebaseConfig = {
            apiKey: "AIzaSyBpB10wDN8yfdCHKa3uSWKo03TQVF6BGaI",
            authDomain: "retreat-2026-ce30d.firebaseapp.com",
            projectId: "retreat-2026-ce30d",
            storageBucket: "retreat-2026-ce30d.firebasestorage.app",
            messagingSenderId: "465178932210",
            appId: "1:465178932210:web:bf26dffacdf6666144b16b"
        };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'beopdong-retreat-2026';

        let app, auth, db;
        try {
            if (Object.keys(firebaseConfig).length > 0) {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else { 
                            await signInAnonymously(auth); 
                        }
                        onConnected();
                    } catch (e) { console.warn("인증 실패:", e); }
                };
                initAuth();
            } else {
                alert("Firebase 설정이 비어있습니다. 코드 내의 firebaseConfig를 수정해주세요.");
            }
        } catch(e) { console.warn("Firebase 연결 안됨"); }

        async function onConnected() {
            const statusBadge = document.getElementById('status-badge');
            statusBadge.innerHTML = '<i class="fa-solid fa-circle-check mr-1"></i>서버 연결 완료';
            statusBadge.classList.replace('bg-gray-200', 'bg-emerald-100');
            statusBadge.classList.replace('text-gray-600', 'text-emerald-700');

            const saveBtn = document.getElementById('save-btn');
            saveBtn.classList.remove('opacity-50', 'pointer-events-none');
            document.getElementById('save-text').innerText = "변경사항 서버에 즉시 적용하기";

            // 기존에 저장된 데이터 불러오기
            const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'retreat_data', 'settings');
            const docSnap = await getDoc(settingsRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                if(data.popup) {
                    document.getElementById('popup-toggle').checked = data.popup.isActive;
                    document.getElementById('popup-message').value = data.popup.message || '';
                }
                if(data.groups) {
                    ['A', 'B', 'C', 'D'].forEach(group => {
                        if(data.groups[group]) {
                            document.getElementById(`group-${group.toLowerCase()}-leader`).value = data.groups[group].leader || '';
                            document.getElementById(`group-${group.toLowerCase()}-members`).value = data.groups[group].members || '';
                        }
                    });
                }
            }

            // 저장 버튼 클릭 이벤트
            saveBtn.onclick = async () => {
                saveBtn.classList.add('opacity-80', 'pointer-events-none');
                document.getElementById('save-spinner').style.display = 'block';
                document.getElementById('save-text').innerText = "저장 중...";

                try {
                    await setDoc(settingsRef, {
                        popup: {
                            isActive: document.getElementById('popup-toggle').checked,
                            message: document.getElementById('popup-message').value
                        },
                        groups: {
                            A: { leader: document.getElementById('group-a-leader').value, members: document.getElementById('group-a-members').value },
                            B: { leader: document.getElementById('group-b-leader').value, members: document.getElementById('group-b-members').value },
                            C: { leader: document.getElementById('group-c-leader').value, members: document.getElementById('group-c-members').value },
                            D: { leader: document.getElementById('group-d-leader').value, members: document.getElementById('group-d-members').value },
                        }
                    }, { merge: true });

                    alert("저장이 완료되었습니다! 선생님들의 폰 화면에 실시간으로 반영됩니다.");
                } catch (error) {
                    alert("저장에 실패했습니다. 인터넷 연결 등을 확인해주세요.");
                    console.error(error);
                } finally {
                    saveBtn.classList.remove('opacity-80', 'pointer-events-none');
                    document.getElementById('save-spinner').style.display = 'none';
                    document.getElementById('save-text').innerText = "변경사항 서버에 즉시 적용하기";
                }
            };
        }
    </script>
</body>
</html>
